networks:
  data-pipeline:
    driver: bridge
    ipam:
      config:
        - subnet: 172.23.0.0/24

services:
  # ============================================
  # Postgres
  # ============================================
  postgres:
    image: postgres:13
    container_name: postgres-airflow
    hostname: postgres
    mem_limit: ${POSTGRES_RAM}
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT}:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}"]
      interval: 10s
      retries: 5
      start_period: 5s
    networks:
      - data-pipeline


  postgres-iceberg:
    image: postgres:13
    container_name: postgres-iceberg
    restart: unless-stopped
    environment:
      POSTGRES_USER: iceberg
      POSTGRES_PASSWORD: iceberg123
      POSTGRES_DB: iceberg_catalog
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "iceberg"]
      interval: 10s
      retries: 5
      start_period: 5s
    networks:
      - data-pipeline

  # ============================================
  # Airflow
  # ============================================
  airflow-webserver:
    image: apache/airflow:2.7.3-python3.10
    container_name: airflow-webserver
    mem_limit: ${AIRFLOW_WEBSERVER_RAM}
    user: root
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      AIRFLOW__CORE__EXECUTOR: ${AIRFLOW_EXECUTOR}
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB}
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
      _PIP_ADDITIONAL_REQUIREMENTS: "kafka-python websockets python-dotenv prometheus-client"
      KAFKA_BROKER: kafka:${KAFKA_INTERNAL_PORT}
    env_file:
      - .env
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./scripts:/opt/airflow/scripts
    ports:
      - "${AIRFLOW_WEBSERVER_EXTERNAL_PORT:-8087}:8080"
    command: webserver
    networks:
      - data-pipeline

  airflow-scheduler:
    image: apache/airflow:2.7.3-python3.10
    container_name: airflow-scheduler
    mem_limit: ${AIRFLOW_SCHEDULER_RAM}
    user: root
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      AIRFLOW__CORE__EXECUTOR: ${AIRFLOW_EXECUTOR}
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB}
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
    env_file:
      - .env
    volumes:
      - ./dags:/opt/airflow/dags
    command: scheduler
    networks:
      - data-pipeline

  airflow-init:
    image: apache/airflow:2.7.3-python3.10
    container_name: airflow-init
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: ${AIRFLOW_EXECUTOR}
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB}
      _AIRFLOW_DB_UPGRADE: "true"
      _AIRFLOW_WWW_USER_CREATE: "true"
      _AIRFLOW_WWW_USER_USERNAME: ${AIRFLOW_ADMIN_USER}
      _AIRFLOW_WWW_USER_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD}
      _AIRFLOW_WWW_USER_FIRSTNAME: ${AIRFLOW_ADMIN_FIRSTNAME}
      _AIRFLOW_WWW_USER_LASTNAME: ${AIRFLOW_ADMIN_LASTNAME}
      _AIRFLOW_WWW_USER_EMAIL: ${AIRFLOW_ADMIN_EMAIL}
      _AIRFLOW_WWW_USER_ROLE: Admin
    entrypoint: /bin/bash
    command: >
      -c "airflow db migrate &&
      airflow users create
      --username ${AIRFLOW_ADMIN_USER}
      --password ${AIRFLOW_ADMIN_PASSWORD}
      --firstname ${AIRFLOW_ADMIN_FIRSTNAME}
      --lastname ${AIRFLOW_ADMIN_LASTNAME}
      --role Admin
      --email ${AIRFLOW_ADMIN_EMAIL} || true"
    networks:
      - data-pipeline

  # ============================================
  # Zookeeper
  # ============================================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    mem_limit: ${ZOOKEEPER_RAM}
    restart: unless-stopped
    ports:
      - "${ZOOKEEPER_CLIENT_PORT}:${ZOOKEEPER_CLIENT_PORT}"
    environment:
      ZOOKEEPER_CLIENT_PORT: ${ZOOKEEPER_CLIENT_PORT}
    networks:
      - data-pipeline

  # ============================================
  # Kafka
  # ============================================
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    mem_limit: ${KAFKA_RAM}
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "${KAFKA_EXTERNAL_PORT}:${KAFKA_EXTERNAL_PORT}"
      - "9404:9404"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:${ZOOKEEPER_CLIENT_PORT}
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:${KAFKA_INTERNAL_PORT},PLAINTEXT_HOST://localhost:${KAFKA_EXTERNAL_PORT}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    command: >
      bash -c "KAFKA_HEAP_OPTS='-Xmx512M -Xms512M'
      /etc/confluent/docker/run"
    networks:
      - data-pipeline

  kafka-ui:
    image: provectuslabs/kafka-ui
    container_name: kafka-ui
    mem_limit: ${KAFKA_UI_RAM}
    ports:
      - "${KAFKA_UI_EXTERNAL_PORT:-8088}:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:${KAFKA_INTERNAL_PORT}
    depends_on:
      - kafka
    networks:
      - data-pipeline

  # ============================================
  # Flink
  # ============================================
  flink-jobmanager:
    image: flink:1.18.1-scala_2.12-java11
    container_name: flink-jobmanager
    restart: unless-stopped
    ports:
      - "18081:18081"
    command: jobmanager
    depends_on:
      - minio
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager
        rest.port: 18081
        state.backend: rocksdb
        state.backend.incremental: true
        AWS_REGION=us-east-1
        AWS_ACCESS_KEY_ID=admin
        AWS_SECRET_ACCESS_KEY=password
        AWS_DEFAULT_REGION=us-east-1
        S3_ENDPOINT=http://minio:9000
        S3_PATH_STYLE_ACCESS=true
        JAVA_TOOL_OPTIONS=-Daws.accessKeyId=admin -Daws.secretKey=password
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18081"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - data-pipeline

  flink-taskmanager:
    image: flink:1.18.1-scala_2.12-java11
    container_name: flink-taskmanager
    restart: unless-stopped
    depends_on:
      - flink-jobmanager
      - minio
    command: taskmanager
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager
        rest.port: 18081
        taskmanager.numberOfTaskSlots: 4
        state.backend: rocksdb
        state.backend.incremental: true
        AWS_REGION=us-east-1
        AWS_ACCESS_KEY_ID=admin
        AWS_SECRET_ACCESS_KEY=password
        AWS_DEFAULT_REGION=us-east-1
        S3_ENDPOINT=http://minio:9000
        S3_PATH_STYLE_ACCESS=true
        JAVA_TOOL_OPTIONS=-Daws.accessKeyId=admin -Daws.secretKey=password
    networks:
      - data-pipeline

  # ============================================
  # MinIO
  # ============================================
  minio:
    image: minio/minio
    container_name: minio
    mem_limit: ${MINIO_RAM}
    restart: unless-stopped

    command: server /data --console-address ":9001"
    

    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"

    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}

    volumes:
      - minio_data:/data

    networks:
      - data-pipeline

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  mc:
    depends_on:
      - minio
    image: minio/mc
    container_name: mc
    networks:
      - data-pipeline
    environment:
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD}
      - AWS_REGION=us-east-1
      - AWS_DEFAULT_REGION=us-east-1
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc config host add minio http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD}) do echo '...waiting...' && sleep 1; done;
      /usr/bin/mc rm -r --force minio/warehouse || true;
      /usr/bin/mc mb minio/warehouse;
      /usr/bin/mc policy set public minio/warehouse;
      tail -f /dev/null
      "
    # ============================================
    # postegres service to be backend of iceberg rest catalog (instead of sqlite so it can handle two concurrent commits of metadata)
    # ============================================
  postgres-iceberg:
    image: postgres:13
    container_name: postgres-iceberg
    hostname: postgres-iceberg
    environment:
      POSTGRES_USER: iceberg
      POSTGRES_PASSWORD: iceberg123
      POSTGRES_DB: iceberg_catalog
    ports:
      - "5433:5432"
    volumes:
      - postgres_iceberg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "iceberg", "-d", "iceberg_catalog"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - data-pipeline

  iceberg-rest:
    image: tabulario/iceberg-rest
    container_name: iceberg-rest
    mem_limit: ${ICEBERG_RAM}
    restart: unless-stopped
    ports:
      - "${ICEBERG_REST_PORT}:8181"
    environment:
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD}
      - AWS_REGION=us-east-1

      # S3 / MinIO
      - CATALOG_WAREHOUSE=s3://warehouse/
      - CATALOG_IO__IMPL=org.apache.iceberg.aws.s3.S3FileIO
      - CATALOG_S3_ENDPOINT=http://minio:9000
      - CATALOG_S3_PATH__STYLE__ACCESS=true

      # IMPORTANT CHANGE (JDBC BACKEND)
      - CATALOG_CATALOG__IMPL=org.apache.iceberg.jdbc.JdbcCatalog
      - CATALOG_URI=jdbc:postgresql://postgres-iceberg:5432/iceberg_catalog
      - CATALOG_JDBC_USER=iceberg
      - CATALOG_JDBC_PASSWORD=iceberg123
      - CATALOG_JDBC_USE_SSL=false
      - CATALOG_JDBC_DRIVER=org.postgresql.Driver
    depends_on:
      minio:
        condition: service_healthy
      mc:
        condition: service_started
      postgres-iceberg:
        condition: service_healthy
    networks:
      - data-pipeline
  sql-client:
    container_name: sql-client
    restart: unless-stopped
    depends_on:
      flink-jobmanager:
        condition: service_healthy
      flink-taskmanager:
        condition: service_started
      iceberg-rest:
        condition: service_started
      kafka:
        condition: service_started
      
      postgres-iceberg:
        condition: service_started

    build:
      context: .
      dockerfile: flink/sql-client/Dockerfile
    environment:
      CATALOG_CATALOG__IMPL: org.apache.iceberg.jdbc.JdbcCatalog
      CATALOG_URI: jdbc:postgresql://postgres-iceberg:5432/iceberg_catalog
      CATALOG_JDBC_USER: iceberg
      CATALOG_JDBC_PASSWORD: iceberg123
      FLINK_JOBMANAGER_HOST: flink-jobmanager
      S3_ENDPOINT: http://minio:9000
      S3_PATH_STYLE_ACCESS: "true"
      AWS_ACCESS_KEY_ID: admin
      AWS_SECRET_ACCESS_KEY: password
      AWS_REGION: us-east-1
      AWS_DEFAULT_REGION: us-east-1
      JAVA_TOOL_OPTIONS: -Daws.accessKeyId=admin -Daws.secretKey=password
 
    volumes:
      - ./flink/sql-client/flink-conf.yaml:/opt/flink/conf/flink-conf.yaml
      - ./flink/sql-jobs/bronze-job.sql:/opt/flink/bronze-job.sql
      - ./flink/sql-jobs/silver-ping-job.sql:/opt/flink/silver-ping-job.sql
    command: >
      /bin/sh -c "
      set -e

      echo 'Running Bronze Job...'
      /opt/flink/bin/sql-client.sh -f /opt/flink/bronze-job.sql

      echo 'Running Silver Job...'
      /opt/flink/bin/sql-client.sh -f /opt/flink/silver-ping-job.sql

      echo 'All jobs started successfully'

      tail -f /dev/null
      "
    networks:
      - data-pipeline


  # ============================================
  # Monitoring
  # ============================================
  prometheus:
    image: prom/prometheus
    container_name: prometheus
    mem_limit: ${PROMETHEUS_RAM}
    ports:
      - "${PROMETHEUS_PORT}:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - data-pipeline

  grafana:
    image: grafana/grafana
    container_name: grafana
    mem_limit: ${GRAFANA_RAM}
    ports:
      - "${GRAFANA_PORT}:3000"
    depends_on:
      - prometheus
    networks:
      - data-pipeline

volumes:
  postgres_data:
  minio_data:
