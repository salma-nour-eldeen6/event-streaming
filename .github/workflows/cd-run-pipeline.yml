name: CD - Run Streaming Pipeline

on:
  push:
    branches: ["feature/CI"]

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    env:
      # =========================
      # Zookeeper & Kafka
      # =========================
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_RAM: 1.5g
      KAFKA_INTERNAL_PORT: 29092
      KAFKA_EXTERNAL_PORT: 9092
      KAFKA_UI_EXTERNAL_PORT: 8088
      KAFKA_RAM: 2.5g
      KAFKA_UI_RAM: 300m

      # =========================
      # MinIO & Iceberg
      # =========================
      MINIO_ROOT_USER: ${{ secrets.MINIO_ROOT_USER }}
      MINIO_ROOT_PASSWORD: ${{ secrets.MINIO_ROOT_PASSWORD }}
      MINIO_API_PORT: 9000
      MINIO_CONSOLE_PORT: 9001
      MINIO_RAM: 400m
      ICEBERG_REST_PORT: 8181
      ICEBERG_RAM: 300m

      # =========================
      # Postgres
      # =========================
      POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
      POSTGRES_PORT: ${{ secrets.POSTGRES_PORT }}
      POSTGRES_RAM: 512m

      # =========================
      # Airflow
      # =========================
      AIRFLOW_ADMIN_USER: ${{ secrets.AIRFLOW_ADMIN_USER }}
      AIRFLOW_ADMIN_PASSWORD: ${{ secrets.AIRFLOW_ADMIN_PASSWORD }}
      AIRFLOW_ADMIN_FIRSTNAME: ${{ secrets.AIRFLOW_ADMIN_FIRSTNAME }}
      AIRFLOW_ADMIN_LASTNAME: ${{ secrets.AIRFLOW_ADMIN_LASTNAME }}
      AIRFLOW_ADMIN_EMAIL: ${{ secrets.AIRFLOW_ADMIN_EMAIL }}
      AIRFLOW_EXECUTOR: LocalExecutor
      AIRFLOW_FERNET_KEY: ${{ secrets.AIRFLOW_FERNET_KEY }}
      AIRFLOW_SECRET_KEY: ${{ secrets.AIRFLOW_SECRET_KEY }}
      AIRFLOW_WEBSERVER_RAM: 600m
      AIRFLOW_SCHEDULER_RAM: 400m

      # =========================
      # Flink
      # =========================
      FLINK_JOBMANAGER_RAM: 600m
      FLINK_TASKMANAGER_RAM: 800m

      # =========================
      # DBT
      DBT_RAM: 200m

      # =========================
      # Monitoring
      GRAFANA_RAM: 200m
      PROMETHEUS_RAM: 200m

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # =========================
      # Build & Run
      # =========================
      - name: Build images
        run: docker compose build

      - name: Start services
        run: docker compose up -d

      # =========================
      # Wait for services
      - name: Wait for Flink
        run: |
          timeout 180 bash -c '
            until curl -s http://localhost:18081 > /dev/null; do
              echo "Waiting for Flink..."
              sleep 5
            done
          '

      - name: Wait for MinIO
        run: |
          timeout 120 bash -c '
            until curl -s http://localhost:9000/minio/health/live > /dev/null; do
              echo "Waiting for MinIO..."
              sleep 5
            done
          '

      # =========================
      # Run Pipeline Script
      - name: Run Pipeline
        run: |
          chmod +x scripts/run_pipeline.sh
          ./scripts/run_pipeline.sh

      # =========================
      # Validate Output 
      - name: Check Iceberg Data
        run: |
          docker exec mc mc ls minio/warehouse || true

      # =========================
      # Debug Logs
      - name: Dump logs on failure
        if: failure()
        run: docker compose logs

      # =========================
      # Cleanup
      - name: Cleanup
        if: always()
        run: docker compose down -v
