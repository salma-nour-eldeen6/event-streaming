name: CI - Code Quality

on:
  push:
  pull_request:

jobs:
  lint-and-syntax:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      # Cache for speed
      - name: Cache pip
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}

      - name: Install tools
        run: |
          pip install pyyaml flake8 sqlfluff
          
      # Python Checks
      - name: Python Syntax Check
        run: |
          for file in $(git ls-files '*.py'); do
            python -m py_compile "$file"
          done

      - name: Lint Python Code (non-blocking)
        run: |
          flake8 . || echo "Lint warnings found (check output above)"

      # YAML Checks
      - name: YAML Validation
        run: |
          for file in $(git ls-files '*.yml' '*.yaml'); do
            python -c "import yaml; yaml.safe_load(open('$file'))"
          done

      # SQL Checks
      - name: SQL Lint (Flink / ANSI)
        run: |
          sqlfluff lint flink/sql-jobs/ --dialect ansi

      - name: SQL Parse Check
        run: |
          for file in $(git ls-files '*.sql'); do
            sqlfluff parse "$file" > /dev/null
          done
